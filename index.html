<!DOCTYPE html>
<html>
<head>
  <title>Academic Homepage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .section {
      flex-basis: 100%;
      margin-bottom: 20px;
    }

    .section-header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .section-content {
      margin-left: 20px;
    }

    .section-content ul {
      list-style-type: disc;
      margin-left: 20px;
    }

    .section-content li {
      margin-bottom: 10px;
    }

    .section-image {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="section">
      <div class="section-image">
        <img src="yuewen.jpg" alt="Profile Picture">
      </div>
      <div class="section-content">
        <h1>About Me</h1>
        <p>
          Insert your bio or description here. Write a brief overview of your academic background, research interests, and any other relevant information.
        </p>
      </div>
    </div>

    <div class="section">
      <div class="section-header">Publications</div>
      <div class="section-content">
        <ul>
          <li>Publication 1</li>
          <li>Publication 2</li>
          <li>Publication 3</li>
          <!-- Add more publications as needed -->
        </ul>
      </div>
    </div>

    <div class="section">
      <div class="section-header">Academic Activities</div>
      <div class="section-content">
        <ul>
          <li>Conference 1</li>
          <li>Workshop 2</li>
          <li>Seminar 3</li>
          <!-- Add more academic activities as needed -->
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
